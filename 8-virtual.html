<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Технології віртуальних мереж</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"><style>* {

#presentation-container:fullscreen,#presentation-container:-webkit-full-screen,#presentation-container:-moz-full-screen,#presentation-container:-ms-fullscreen{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)!important;}</style></head><body><div id="presentation-container"><div class="progress"><div class="progress-bar" id="progress-bar"></div></div><button id="sidebar-toggle" onclick="toggleSidebar()" title="Навігація слайдами (S)">☰</button><div id="sidebar"><div id="sidebar-header"><h3>📑 Слайди</h3><button id="sidebar-close" onclick="toggleSidebar()">✕</button></div><div id="sidebar-content"></div></div><div class="slide-container"><div class="slide" id="current-slide"></div></div><div class="controls"><button class="control-btn" onclick="previousSlide()" title="Попередній (←)">←</button><button class="control-btn" onclick="nextSlide()" title="Наступний (→)">→</button><button class="control-btn" onclick="toggleFullscreen()" title="Повноекранний режим (F)">⛶</button><button class="control-btn" onclick="toggleHelp()" title="Допомога (?)">?</button></div><div class="slide-number" id="slide-number">1 / 18</div><div id="help-overlay" class="hidden"><strong>Гарячі клавіші:</strong><br><kbd>←</kbd> <kbd>→</kbd> Навігація<br><kbd>F</kbd> Повноекранний режим<br><kbd>S</kbd> Sidebar<br><kbd>?</kbd> Допомога<br><kbd>Esc</kbd> Закрити</div></div><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script><script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script><script>const slides=["<h1>Технології віртуальних мереж</h1>\n<p><strong>Організація комп'ютерних мереж</strong></p>\n<p>Лектор: Кобилянський Антон</p>\n","<h1>📋 План лекції</h1>\n<ol>\n<li>🤔 Проблеми \"плоских\" локальних мереж</li>\n<li>🌐 Що таке VLAN та як це працює</li>\n<li>🏷️ Тегування кадрів: стандарт IEEE 802.1Q</li>\n<li>🔌 Типи портів: access та trunk</li>\n<li>⚙️ Налаштування VLAN на комутаторі Cisco</li>\n<li>🔗 Маршрутизація між VLAN</li>\n<li>✅ Ключові висновки та контрольні питання</li>\n</ol>\n","<h1>🤔 Проблеми великих локальних мереж</h1>\n<div class=\"info\"><strong>ℹ️ Ситуація</strong> <p>У звичайній мережі всі комп'ютери, підключені до комутаторів, знаходяться в <strong>одному широкомовному домені</strong> — тобто \"чують\" один одного.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Коли мережа розростається, це спричиняє проблеми продуктивності, безпеки та керованості.</p>\n<h2>⚠️ Основні проблеми</h2>\n<table>\n<thead>\n<tr>\n<th>Проблема</th>\n<th>Наслідок</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>📢 Широкомовний трафік</td>\n<td>ARP, DHCP-запити доходять до всіх пристроїв</td>\n</tr>\n<tr>\n<td>🐢 Зниження продуктивності</td>\n<td>Кожен пристрій обробляє зайві пакети</td>\n</tr>\n<tr>\n<td>🔓 Відсутність ізоляції</td>\n<td>Бухгалтерія \"бачить\" комп'ютери розробників</td>\n</tr>\n<tr>\n<td>🏢 Фізична прив'язка</td>\n<td>Групи користувачів обмежені розташуванням кабелів</td>\n</tr>\n<tr>\n<td>🛠️ Складність керування</td>\n<td>Зміна структури потребує перекомутації</td>\n</tr>\n</tbody></table>\n<div class=\"warning\"><strong>⚠️ Приклад</strong> <p>В офісі на 200 комп'ютерів кожен ARP-запит надсилається на всі 200 пристроїв. При активній роботі це створює значне фонове навантаження на мережу.</p>\n</div>\n\n","<h1>🌐 VLAN: ідея технології</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>VLAN</strong> (Virtual Local Area Network / Віртуальна локальна мережа) — логічна група пристроїв, яка поводиться як окрема локальна мережа, незалежно від фізичного розташування пристроїв.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> VLAN дозволяє розділити один фізичний комутатор на кілька незалежних \"віртуальних\" комутаторів.</p>\n<h2>💡 Аналогія</h2>\n<p>Уявіть багатоквартирний будинок:</p>\n<ul>\n<li><strong>Без VLAN:</strong> усі квартири — це одне велике приміщення без стін</li>\n<li><strong>З VLAN:</strong> стіни розділяють простір на окремі квартири, хоча будинок — один</li>\n</ul>\n<h2>🎯 Що дає VLAN</h2>\n<ul>\n<li>🛡️ <strong>Ізоляція трафіку</strong> — пристрої різних VLAN не бачать один одного на L2</li>\n<li>📉 <strong>Зменшення broadcast-трафіку</strong> — кожен VLAN має власний широкомовний домен</li>\n<li>🧩 <strong>Логічна організація</strong> — групування за відділами, а не за кабелями</li>\n<li>🔐 <strong>Підвищення безпеки</strong> — обмеження доступу між групами</li>\n<li>🔄 <strong>Гнучкість</strong> — зміна групи без переключення кабелів</li>\n</ul>\n","<h1>🏗️ VLAN: як це виглядає</h1>\n<p><strong>Головна ідея:</strong> Один фізичний комутатор обслуговує кілька VLAN одночасно — наче всередині нього є кілька окремих комутаторів.</p>\n\n<div class=\"mermaid\" data-source=\"graph TB\n    subgraph SW[&quot;🔲 Фізичний комутатор&quot;]\n        direction LR\n        V10[&quot;VLAN 10&lt;br/&gt;Бухгалтерія&quot;]\n        V20[&quot;VLAN 20&lt;br/&gt;Розробка&quot;]\n        V30[&quot;VLAN 30&lt;br/&gt;Гості&quot;]\n    end\n    PC1[&quot;💻 PC1&quot;] --&gt; V10\n    PC2[&quot;💻 PC2&quot;] --&gt; V10\n    PC3[&quot;💻 PC3&quot;] --&gt; V20\n    PC4[&quot;💻 PC4&quot;] --&gt; V20\n    PC5[&quot;💻 PC5&quot;] --&gt; V30\n    style V10 fill:#e8f5e9,stroke:#388e3c\n    style V20 fill:#e3f2fd,stroke:#1565c0\n    style V30 fill:#fff3e0,stroke:#ef6c00\n    style SW fill:#fff9c4,stroke:#f9a825\"><svg id=\"exp-1776625949317-4-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 782.11328125px;\" viewBox=\"0 0 782.11328125 236\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1776625949317-4-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1776625949317-4-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp e(227.109375, 32)\"><rect class=\"basic label-container\" style=\"\" x=\"-49.26171875\" y=\"-24\" width=\"98.5234375\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-25.26171875, -12)\"><rect></rect><foreignObject width=\"50.5234375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>💻 PC2</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1776625949317-4-0-flowchart-PC3-7\" data-look=\"classic\" transform=\"translate(375.8203125, 32)\"><rect class=\"basic label-container\" style=\"\" x=\"-49.44921875\" y=\"-24\" width=\"98.8984375\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-25.44921875, -12)\"><rect></rect><foreignObject width=\"50.8984375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>💻 PC3</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1776625949317-4-0-flowchart-PC4-9\" data-look=\"classic\" transform=\"translate(524.8515625, 32)\"><rect class=\"basic label-container\" style=\"\" x=\"-49.58203125\" y=\"-24\" width=\"99.1640625\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-25.58203125, -12)\"><rect></rect><foreignObject width=\"51.1640625\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>💻 PC4</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1776625949317-4-0-flowchart-PC5-11\" data-look=\"classic\" transform=\"translate(682.640625, 32)\"><rect class=\"basic label-container\" style=\"\" x=\"-49.37890625\" y=\"-24\" width=\"98.7578125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-25.37890625, -12)\"><rect></rect><foreignObject width=\"50.7578125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>💻 PC5</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1776625949317-4-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1776625949317-4-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<div class=\"tip\"><strong>💡 Важливо</strong> <p>Пристрої в різних VLAN <strong>не можуть</strong> спілкуватися напряму на канальному рівні, навіть якщо підключені до одного комутатора. Для зв'язку між VLAN потрібен маршрутизатор (L3).</p>\n</div>\n\n","<h1>🏷️ Рівень OSI та VLAN ID</h1>\n<div class=\"info\"><strong>ℹ️ Розташування</strong> <p>VLAN — це технологія <strong>канального рівня (L2)</strong> моделі OSI. Саме тому VLAN реалізується на комутаторах.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Кожна VLAN має унікальний ідентифікатор — <strong>VLAN ID</strong> — який визначає її приналежність.</p>\n<h2>🔢 Діапазон VLAN ID</h2>\n<table>\n<thead>\n<tr>\n<th>Діапазон</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>0, 4095</strong></td>\n<td>Зарезервовані стандартом — не використовуються</td>\n</tr>\n<tr>\n<td><strong>1</strong></td>\n<td>VLAN за замовчуванням (default) — усі порти тут</td>\n</tr>\n<tr>\n<td><strong>2–1001</strong></td>\n<td>Звичайний діапазон (normal range)</td>\n</tr>\n<tr>\n<td><strong>1002–1005</strong></td>\n<td>Зарезервовано для Token Ring та FDDI (історично)</td>\n</tr>\n<tr>\n<td><strong>1006–4094</strong></td>\n<td>Розширений діапазон (extended range)</td>\n</tr>\n</tbody></table>\n<div class=\"note\"><strong>📝 Практика</strong> <p>У навчальних та більшості виробничих сценаріїв використовується звичайний діапазон <strong>2–1001</strong>. VLAN 1 не застосовують для користувацького трафіку з міркувань безпеки.</p>\n</div>\n\n","<h1>🏷️ Тегування кадрів: IEEE 802.1Q</h1>\n<p><strong>Головна ідея:</strong> Щоб комутатори знали, до якого VLAN належить кадр, до нього додається спеціальна 4-байтна мітка — <strong>тег 802.1Q</strong>.</p>\n<h2>📦 Структура тегованого кадру</h2>\n<pre><code class=\"language-plaintext hljs\" data-highlighted=\"yes\">┌──────────┬─────────┬────────────┬──────┬─────────┬─────┐\n│ Dest MAC │ Src MAC │ 802.1Q TAG │ Type │ Data    │ FCS │\n│ 6 байт   │ 6 байт  │ 4 байти    │      │         │     │\n└──────────┴─────────┴────────────┴──────┴─────────┴─────┘\n                          │\n                          ▼\n        ┌─────────────┬──────────────────────┐\n        │ TPID        │ TCI                  │\n        │ 2 байти     │ 2 байти              │\n        │ (0x8100)    │                      │\n        └─────────────┴──────────────────────┘\n                               │\n                               ▼\n                  ┌─────┬─────┬──────────────┐\n                  │ PCP │ DEI │ VLAN ID      │\n                  │ 3 б │ 1 б │ 12 біт       │\n                  └─────┴─────┴──────────────┘</code></pre><h2>🔑 Ключові поля тегу</h2>\n<table>\n<thead>\n<tr>\n<th>Поле</th>\n<th>Розмір</th>\n<th>Призначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>TPID</strong></td>\n<td>2 байти</td>\n<td>Ідентифікатор типу протоколу (значення <code>0x8100</code>)</td>\n</tr>\n<tr>\n<td><strong>TCI</strong></td>\n<td>2 байти</td>\n<td>Контрольна інформація тегу (містить PCP, DEI, VID)</td>\n</tr>\n<tr>\n<td><strong>PCP</strong></td>\n<td>3 біти</td>\n<td>Пріоритет кадру для QoS (8 рівнів: 0–7)</td>\n</tr>\n<tr>\n<td><strong>DEI</strong></td>\n<td>1 біт</td>\n<td>Ознака \"можна відкинути при перевантаженні\"</td>\n</tr>\n<tr>\n<td><strong>VLAN ID</strong></td>\n<td>12 біт</td>\n<td>Номер VLAN (діапазон 0–4095)</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Чому саме 12 біт?</strong> <p>Поле VLAN ID має розмір 12 біт, тому теоретично можна закодувати 2¹² = 4096 значень. Два з них (0 і 4095) зарезервовані стандартом, тому реально доступно <strong>4094</strong> унікальних VLAN.</p>\n</div>\n\n","<h1>🔌 Access та Trunk порти</h1>\n<div class=\"info\"><strong>ℹ️ Два типи портів</strong> <p>Порт комутатора може працювати в одному з двох основних режимів залежно від того, скільки VLAN він обслуговує.</p>\n</div>\n\n\n\n<h2>🎯 Access port (порт доступу)</h2>\n<ul>\n<li>Належить <strong>одному</strong> конкретному VLAN</li>\n<li>Передає <strong>нетегований</strong> трафік</li>\n<li>Використовується для підключення <strong>кінцевих пристроїв</strong> (ПК, принтери, IP-телефони)</li>\n<li>Пристрій \"не знає\" про існування VLAN</li>\n</ul>\n<h2>🛣️ Trunk port (магістральний порт)</h2>\n<ul>\n<li>Передає трафік <strong>кількох VLAN</strong> одночасно</li>\n<li>Кадри передаються <strong>з тегами</strong> 802.1Q</li>\n<li>Використовується для з'єднань <strong>між комутаторами</strong> або до маршрутизатора</li>\n<li>Має поняття <strong>Native VLAN</strong> — єдиний VLAN, трафік якого передається без тегу</li>\n</ul>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    PC1[&quot;💻 PC&lt;br/&gt;VLAN 10&quot;] ---|&quot;Access&quot;| SW1[&quot;🔲 Switch 1&quot;]\n    PC2[&quot;💻 PC&lt;br/&gt;VLAN 20&quot;] ---|&quot;Access&quot;| SW1\n    SW1 ===|&quot;Trunk&lt;br/&gt;VLAN 10, 20, 99&quot;| SW2[&quot;🔲 Switch 2&quot;]\n    SW2 ---|&quot;Access&quot;| PC3[&quot;💻 PC&lt;br/&gt;VLAN 10&quot;]\n    SW2 ---|&quot;Access&quot;| PC4[&quot;💻 PC&lt;br/&gt;VLAN 20&quot;]\n    style SW1 fill:#fff9c4,stroke:#f9a825\n    style SW2 fill:#fff9c4,stroke:#f9a825\"><svg id=\"exp-1776625949356-7-0\" width=\"100%\" xmlns=\"http://www.w "-24\" width=\"130.4453125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-41.22265625, -12)\"><rect></rect><foreignObject width=\"82.4453125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🔲 Switch 2</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1776625949356-7-0-flowchart-PC3-7\" data-look=\"classic\" transform=\"translate(818.86328125, 44)\"><rect class=\"basic label-container\" style=\"\" x=\"-55.16796875\" y=\"-36\" width=\"110.3359375\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-31.16796875, -24)\"><rect></rect><foreignObject width=\"62.3359375\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>💻 PC<br>VLAN 10</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"exp-1776625949356-7-0-flowchart-PC4-9\" data-look=\"classic\" transform=\"translate(818.86328125, 166)\"><rect class=\"basic label-container\" style=\"\" x=\"-56.28515625\" y=\"-36\" width=\"112.5703125\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-32.28515625, -24)\"><rect></rect><foreignObject width=\"64.5703125\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>💻 PC<br>VLAN 20</p></span></div></foreignObject></g></g></g></g></g><defs><filter id=\"exp-1776625949356-7-0-drop-shadow\" height=\"130%\" width=\"130%\"><feDropShadow dx=\"4\" dy=\"4\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1776625949356-7-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n","<h1>🌉 Native VLAN та управління</h1>\n<p><strong>Головна ідея:</strong> Native VLAN — це VLAN, трафік якого передається через trunk-порт <strong>без тегу</strong>. За замовчуванням на обладнанні Cisco це VLAN 1.</p>\n<h2>⚙️ Навіщо потрібен Native VLAN</h2>\n<ul>\n<li>🔄 Сумісність із пристроями, які не підтримують 802.1Q (нетегований трафік)</li>\n<li>📨 Якщо на trunk-порт надходить нетегований кадр — його відносять саме до native VLAN</li>\n<li>🔧 Забезпечення взаємодії зі старим або спрощеним обладнанням</li>\n</ul>\n<h2>🛡️ Management VLAN</h2>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Management VLAN</strong> — окремий VLAN, який використовується для віддаленого адміністрування комутаторів (SSH, Telnet, SNMP).</p>\n</div>\n\n\n\n<p><strong>Рекомендації з безпеки:</strong></p>\n<ul>\n<li>🚫 Не використовувати VLAN 1 як management</li>\n<li>🚫 Не використовувати VLAN 1 як native</li>\n<li>✅ Виділити окремий VLAN (наприклад, VLAN 99) для управління</li>\n<li>✅ Обмежити доступ до management VLAN</li>\n</ul>\n<div class=\"warning\"><strong>⚠️ Застереження</strong> <p>Native VLAN має збігатися на обох кінцях trunk-з'єднання. Якщо на одному порту native VLAN 1, а на іншому — VLAN 99, виникає невідповідність, про яку повідомить протокол CDP (<code>native VLAN mismatch</code>).</p>\n</div>\n\n","<h1>⚙️ Створення VLAN на комутаторі</h1>\n<p><strong>Головна ідея:</strong> Налаштування VLAN у Cisco IOS виконується в кілька простих кроків через режим глобальної конфігурації.</p>\n<h2>📝 Створення VLAN</h2>\n<pre><code class=\"language-cisco\">Switch&gt; enable\nSwitch# configure terminal\nSwitch(config)# vlan 10\nSwitch(config-vlan)# name Sales\nSwitch(config-vlan)# exit\n\nSwitch(config)# vlan 20\nSwitch(config-vlan)# name Engineering\nSwitch(config-vlan)# exit</code></pre><h2>🔌 Призначення access-порту до VLAN</h2>\n<pre><code class=\"language-cisco\">Switch(config)# interface fa0/5\nSwitch(config-if)# switchport mode access\nSwitch(config-if)# switchport access vlan 10\nSwitch(config-if)# no shutdown</code></pre><h2>📦 Налаштування діапазону портів одразу</h2>\n<pre><code class=\"language-cisco\">Switch(config)# interface range fa0/6-10\nSwitch(config-if-range)# switchport mode access\nSwitch(config-if-range)# switchport access vlan 30</code></pre><div class=\"tip\"><strong>💡 Економія часу</strong> <p>Команда <code>interface range</code> дозволяє налаштовувати кілька портів одночасно — це зручно, коли до одного VLAN належить група портів.</p>\n</div>\n\n","<h1>🛣️ Налаштування trunk-порту</h1>\n<p><strong>Головна ідея:</strong> Trunk-порт вимагає явного переведення в режим магістралі та (за потреби) задання native VLAN.</p>\n<h2>📝 Базове налаштування trunk</h2>\n<pre><code class=\"language-cisco\">Switch(config)# interface fa0/1\nSwitch(config-if)# switchport mode trunk\nSwitch(config-if)# switchport trunk native vlan 99\nSwitch(config-if)# no shutdown</code></pre><h2>🎚️ Обмеження VLAN на trunk</h2>\n<p>За замовчуванням trunk передає трафік усіх VLAN. Для безпеки та оптимізації можна явно вказати список:</p>\n<pre><code class=\"language-cisco\">Switch(config-if)# switchport trunk allowed vlan 10,20,30,99</code></pre><h2>🔍 Перегляд статусу trunk</h2>\n<pre><code class=\"language-cisco\">Switch# show interfaces trunk\n\nPort      Mode         Encapsulation  Status        Native vlan\nFa0/1     on           802.1q         trunking      99\n\nPort      Vlans allowed on trunk\nFa0/1     1-4094</code></pre>","<h1>🌐 IP-адреса для управління</h1>\n<p><strong>Головна ідея:</strong> Комутатор 2-го рівня сам по собі не має IP-адреси на фізичних портах. IP-адреса призначається <strong>віртуальному інтерфейсу VLAN (SVI)</strong> для віддаленого управління.</p>\n<h2>📝 Створення SVI</h2>\n<pre><code class=\"language-cisco\">Switch(config)# interface vlan 99\nSwitch(config-if)# ip address 192.168.99.11 255.255.255.0\nSwitch(config-if)# no shutdown\nSwitch(config)# ip default-gateway 192.168.99.1</code></pre><div class=\"info\"><strong>ℹ️ SVI</strong> <p><strong>SVI</strong> (Switched Virtual Interface) — логічний інтерфейс, що представляє VLAN на самому комутаторі. Саме через нього здійснюється віддалене керування.</p>\n</div>\n\n\n\n<h2>✅ Переваги підходу</h2>\n<ul>\n<li>Доступ до комутатора з будь-якого порту management VLAN</li>\n<li>Незалежність від конкретного фізичного порту</li>\n<li>Можливість віддаленого налаштування через SSH/Telnet</li>\n<li>Централізоване управління</li>\n</ul>\n","<h1>🔍 Перевірка налаштувань VLAN</h1>\n<p><strong>Головна ідея:</strong> Cisco IOS надає кілька команд для перевірки коректності налаштування VLAN.</p>\n<h2>📋 Основні команди діагностики</h2>\n<table>\n<thead>\n<tr>\n<th>Команда</th>\n<th>Що показує</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>show vlan brief</code></td>\n<td>Стислий перелік VLAN та їхніх портів</td>\n</tr>\n<tr>\n<td><code>show vlan id &lt;номер&gt;</code></td>\n<td>Детальна інформація про конкретний VLAN</td>\n</tr>\n<tr>\n<td><code>show interfaces trunk</code></td>\n<td>Статус trunk-портів та дозволених VLAN</td>\n</tr>\n<tr>\n<td><code>show interfaces switchport</code></td>\n<td>Режим порту та належність до VLAN</td>\n</tr>\n<tr>\n<td><code>show running-config</code></td>\n<td>Поточна конфігурація пристрою</td>\n</tr>\n</tbody></table>\n<h2>📊 Приклад виводу <code>show vlan brief</code></h2>\n<pre><code class=\"language-plaintext hljs\" data-highlighted=\"yes\">VLAN Name          Status    Ports\n---- ------------- --------- -------------------------------\n1    default       active    Fa0/2, Fa0/3, Fa0/4\n10   Green         active    Fa0/11, Fa0/12, Fa0/13\n20   Amber         active    Fa0/18, Fa0/19\n30   Red           active    Fa0/6, Fa0/7\n99   management    active</code></pre><div class=\"tip\"><strong>💡 Корисна звичка</strong> <p>Після кожного етапу налаштування VLAN виконуйте <code>show vlan brief</code> — це швидкий спосіб переконатися, що порти опинилися у правильних VLAN.</p>\n</div>\n\n","<h1>🔗 Маршрутизація між VLAN</h1>\n<div class=\"warning\"><strong>⚠️ Ключовий факт</strong> <p>Пристрої в різних VLAN <strong>не можуть</strong> обмінюватися даними лише засобами комутатора 2-го рівня. Потрібен пристрій 3-го рівня — <strong>маршрутизатор</strong> або <strong>комутатор 3-го рівня</strong>.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Для зв'язку між VLAN використовують три основні підходи.</p>\n<h2>🛠️ Варіанти реалізації</h2>\n\n<div class=\"mermaid\" data-source=\"graph TD\n    START[&quot;🔗 Inter-VLAN&lt;br/&gt;Routing&quot;] --&gt; M1[&quot;1️⃣ Класичний&lt;br/&gt;(Legacy)&quot;]\n    START --&gt; M2[&quot;2️⃣ Router-on-a-Stick&quot;]\n    START --&gt; M3[&quot;3️⃣ L3 Switch&lt;br/&gt;(SVI)&quot;]\n    M1 --&gt; D1[&quot;Окремий фізичний&lt;br/&gt;інтерфейс&lt;br/&gt;на кожен VLAN&quot;]\n    M2 --&gt; D2[&quot;Один інтерфейс +&lt;br/&gt;підінтерфейси&lt;br/&gt;з тегами&quot;]\n    M3 --&gt; D3[&quot;Віртуальні інтерфейси&lt;br/&gt;VLAN на комутаторі&lt;br/&gt;рівня 3&quot;]\n    style START fill:#fff9c4,stroke:#f9a825\n    style M1 fill:#fce4ec,stroke:#c2185b\n    style M2 fill:#e3f2fd,stroke:#1565c0\n    style M3 fill:#e8f5e9,stroke:#388e3c\"><svg id=\"exp-1776625949371-13-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 708.5234375px;\" viewBox=\"0 0 708.5234375 356\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1776625949371-13-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1776625949371-13-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#exp-1776625949371-13-0 .edge-animation-fast{ flood-color=\"#000000\"></feDropShadow></filter></defs><defs><filter id=\"exp-1776625949371-13-0-drop-shadow-small\" height=\"150%\" width=\"150%\"><feDropShadow dx=\"2\" dy=\"2\" stdDeviation=\"0\" flood-opacity=\"0.06\" flood-color=\"#000000\"></feDropShadow></filter></defs></svg></div>\n<h2>📊 Порівняння підходів</h2>\n<table>\n<thead>\n<tr>\n<th>Підхід</th>\n<th>Масштабованість</th>\n<th>Продуктивність</th>\n<th>Застосування</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Legacy</td>\n<td>🔴 Низька</td>\n<td>🟡 Середня</td>\n<td>Історичні мережі</td>\n</tr>\n<tr>\n<td>Router-on-a-Stick</td>\n<td>🟡 Середня</td>\n<td>🟡 Обмежена</td>\n<td>Малі/середні мережі</td>\n</tr>\n<tr>\n<td>L3 Switch</td>\n<td>🟢 Висока</td>\n<td>🟢 Висока</td>\n<td>Корпоративні мережі</td>\n</tr>\n</tbody></table>\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Що ми дізналися:</strong></p>\n<ol>\n<li><p><strong>VLAN</strong> — логічне розділення мережі на рівні комутаторів, що забезпечує ізоляцію трафіку та гнучкість структури.</p>\n</li>\n<li><p><strong>VLAN ID</strong> (1–4094) унікально ідентифікує кожну віртуальну мережу; значення 0 та 4095 зарезервовані, а VLAN 1 — за замовчуванням.</p>\n</li>\n<li><p><strong>IEEE 802.1Q</strong> — стандарт тегування кадрів, який додає 4-байтовий заголовок з VLAN ID.</p>\n</li>\n<li><p><strong>Access-порти</strong> передають нетегований трафік одного VLAN; <strong>trunk-порти</strong> — тегований трафік кількох VLAN.</p>\n</li>\n<li><p><strong>Native VLAN</strong> — VLAN, трафік якого йде через trunk без тегу. З міркувань безпеки не використовуємо VLAN 1.</p>\n</li>\n<li><p><strong>SVI</strong> (інтерфейс VLAN) забезпечує IP-адресацію комутатора для віддаленого управління.</p>\n</li>\n<li><p><strong>Зв'язок між VLAN</strong> потребує маршрутизатора або комутатора 3-го рівня.</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Що таке VLAN і на якому рівні моделі OSI працює ця технологія?</p>\n</li>\n<li><p>🤔 Які проблеми локальних мереж вирішує впровадження VLAN?</p>\n</li>\n<li><p>🤔 Який діапазон значень може мати VLAN ID? Які значення зарезервовані?</p>\n</li>\n<li><p>🤔 Чим відрізняються access-порт і trunk-порт? Для чого використовується кожен?</p>\n</li>\n<li><p>🤔 Що таке native VLAN і навіщо він потрібен у trunk-з'єднанні?</p>\n</li>\n<li><p>🤔 Якими командами Cisco IOS створюється новий VLAN і призначається порт до нього?</p>\n</li>\n<li><p>🤔 Чому для зв'язку між пристроями різних VLAN потрібен маршрутизатор?</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Віртуальна мережа</td>\n<td>Virtual LAN</td>\n<td>Логічна група пристроїв, ізольована на рівні L2</td>\n</tr>\n<tr>\n<td>Широкомовний домен</td>\n<td>Broadcast domain</td>\n<td>Множина пристроїв, що отримують один широкомовний кадр</td>\n</tr>\n<tr>\n<td>Тегування</td>\n<td>Tagging</td>\n<td>Додавання VLAN-мітки до кадру Ethernet</td>\n</tr>\n<tr>\n<td>Порт доступу</td>\n<td>Access port</td>\n<td>Порт, що належить одному VLAN і передає нетегований трафік</td>\n</tr>\n<tr>\n<td>Магістральний порт</td>\n<td>Trunk port</td>\n<td>Порт, що передає тегований трафік кількох VLAN</td>\n</tr>\n<tr>\n<td>Native VLAN</td>\n<td>Native VLAN</td>\n<td>VLAN, трафік якого на trunk-порту передається без тегу</td>\n</tr>\n<tr>\n<td>Маршрутизація між VLAN</td>\n<td>Inter-VLAN routing</td>\n<td>Передача трафіку між різними VLAN через пристрій L3</td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>VLAN</td>\n<td>Virtual Local Area Network</td>\n<td>Віртуальна локальна мережа</td>\n</tr>\n<tr>\n<td>LAN</td>\n<td>Local Area Network</td>\n<td>Локальна мережа</td>\n</tr>\n<tr>\n<td>ID</td>\n<td>Identifier</td>\n<td>Ідентифікатор</td>\n</tr>\n<tr>\n<td>OSI</td>\n<td>Open Systems Interconnection</td>\n<td>Взаємодія відкритих систем</td>\n</tr>\n<tr>\n<td>IEEE</td>\n<td>Institute of Electrical &amp; Electronics Engineers</td>\n<td>Інститут інженерів електрики та електроніки</td>\n</tr>\n<tr>\n<td>TPID</td>\n<td>Tag Protocol Identifier</td>\n<td>Ідентифікатор типу протоколу тегу</td>\n</tr>\n<tr>\n<td>TCI</td>\n<td>Tag Control Information</td>\n<td>Контрольна інформація тегу</td>\n</tr>\n<tr>\n<td>PCP</td>\n<td>Priority Code Point</td>\n<td>Поле коду пріоритету</td>\n</tr>\n<tr>\n<td>DEI</td>\n<td>Drop Eligible Indicator</td>\n<td>Індикатор можливості відкидання кадру</td>\n</tr>\n<tr>\n<td>QoS</td>\n<td>Quality of Service</td>\n<td>Якість обслуговування</td>\n</tr>\n<tr>\n<td>SVI</td>\n<td>Switched Virtual Interface</td>\n<td>Віртуальний інтерфейс комутатора</td>\n</tr>\n<tr>\n<td>IOS</td>\n<td>Internetwork Operating System</td>\n<td>Мережева операційна система (Cisco)</td>\n</tr>\n<tr>\n<td>CDP</td>\n<td>Cisco Discovery Protocol</td>\n<td>Протокол виявлення Cisco</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
