2.875, 35.25)\"><rect class=\"basic label-container\" style=\"fill:#e3f2fd !important;stroke:#1565c0 !important\" x=\"-33.7421875\" y=\"-24\" width=\"67.484375\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-9.7421875, -12)\"><rect></rect><foreignObject width=\"19.484375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>R2</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-R3-5\" transform=\"translate(592.9921875, 105.75)\"><rect class=\"basic label-container\" style=\"fill:#e3f2fd !important;stroke:#1565c0 !important\" x=\"-33.9296875\" y=\"-24\" width=\"67.859375\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-9.9296875, -12)\"><rect></rect><foreignObject width=\"19.859375\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>R3</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-R4-7\" transform=\"translate(825.3828125, 70.5)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-106.015625\" y=\"-24\" width=\"212.03125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-82.015625, -12)\"><rect></rect><foreignObject width=\"164.03125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🎯 R4 -- Призначення</p></span></div></foreignObject></g></g></g></g></g></svg></div>\n<div class=\"warning\"><strong>⚠️ Недолік</strong> <p>Пропускна здатність використовується вкрай неефективно — мережа «затоплюється» дублікатами. Перевага: пакет <strong>гарантовано</strong> дійде, якщо хоча б один шлях існує.</p>\n</div>\n\n\n\n<h2>⚡ Маршрутизація, керована подіями</h2>\n<p>Пакет надсилається маршрутом, який <strong>вже приводив до успіху</strong> раніше. Маршрутизатор фіксує факт успішної доставки.</p>\n<h2>📍 Маршрутизація від джерела (Source Routing)</h2>\n<p>Відправник <strong>сам вказує у пакеті</strong> список проміжних маршрутизаторів. Інформацію надає адміністратор або вузол-відправник автоматично. Застосовується в деяких протоколах діагностики мережі.</p>\n","<h1>🔒 Статична маршрутизація</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Статична маршрутизація</strong> — метод, при якому маршрути вручну прописуються адміністратором і не змінюються автоматично при зміні топології мережі.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Статична маршрутизація — як паперова карта: точна і передбачувана, але якщо дорогу перекрито — сама не перебудується.</p>\n<div class=\"tip\"><strong>💡 Коли обирати статичну маршрутизацію?</strong> <p>✅ Малі мережі з простою та стабільною топологією<br>✅ Потрібна повна передбачуваність трафіку<br>✅ Є лише один вихід у зовнішню мережу (маршрут за замовчуванням)<br>❌ Велика мережа з частими змінами топології — зміна мережі вимагатиме ручного оновлення маршрутів на <strong>кожному</strong> маршрутизаторі</p>\n</div>\n\n","<h1>🔄 Динамічна маршрутизація</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Динамічна (адаптивна) маршрутизація</strong> — метод, при якому маршрутизатори автоматично оновлюють таблиці маршрутизації на основі інформації, яку вони обмінюють між собою через протоколи маршрутизації.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Маршрутизатори автоматично обмінюються інформацією про стан мережі і самостійно перебудовують таблиці маршрутизації при змінах топології — без участі адміністратора.</p>\n<h2>🔁 Дві ключові функції динамічного маршрутизатора</h2>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    R[🔄 Маршрутизатор] 670.828125, 362)\"><rect class=\"basic label-container\" style=\"\" x=\"-124\" y=\"-36\" width=\"248\" height=\"72\"></rect><g class=\"label\" style=\"\" transform=\"translate(-100, -24)\"><rect></rect><foreignObject width=\"200\" height=\"48\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;\"><span class=\"nodeLabel \"><p>Сповіщення про зміни топології</p></span></div></foreignObject></g></g></g></g></g></svg></div>\n<div class=\"tip\"><strong>💡 Перевага над статичною</strong> <p>При відмові каналу або маршрутизатора динамічна маршрутизація <strong>автоматично перебудує</strong> таблиці і знайде альтернативний шлях. Статична цього зробити не може.</p>\n</div>\n\n","<h1>🗄️ Таблиця маршрутизації та метрики</h1>\n<p><strong>Головна ідея:</strong> Таблиця маршрутизації — це «дорожня карта» маршрутизатора. Для кожної відомої мережі вона зберігає інформацію про те, <em>куди</em> і <em>яким шляхом</em> пересилати пакети.</p>\n<h2>🗂️ Структура таблиці маршрутизації</h2>\n<table>\n<thead>\n<tr>\n<th>🌐 Мережа призначення</th>\n<th>🎭 Маска</th>\n<th>➡️ Наступний хоп</th>\n<th>🔌 Інтерфейс</th>\n<th>📏 Метрика</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>192.168.1.0</td>\n<td>/24</td>\n<td>10.0.0.1</td>\n<td>eth0</td>\n<td>1</td>\n</tr>\n<tr>\n<td>10.0.0.0</td>\n<td>/8</td>\n<td>—</td>\n<td>eth1</td>\n<td>0</td>\n</tr>\n<tr>\n<td>0.0.0.0</td>\n<td>/0</td>\n<td>172.16.0.1</td>\n<td>eth0</td>\n<td>10</td>\n</tr>\n</tbody></table>\n<div class=\"note\"><strong>📝 Маршрут за замовчуванням</strong> <p>Рядок <code>0.0.0.0/0</code> — це <strong>маршрут за замовчуванням</strong> (default route). Якщо жоден інший маршрут не підходить, пакет іде через нього. Саме так налаштовується вихід у Інтернет.</p>\n</div>\n\n\n\n<h2>🔍 Як маршрутизатор приймає рішення?</h2>\n<p>Коли надходить пакет до <code>192.168.1.50</code>, маршрутизатор виконує три кроки:</p>\n<ol>\n<li>🔎 <strong>Переглядає таблицю</strong> і шукає рядок, чия мережа/маска збігається з адресою призначення</li>\n<li>📏 <strong>Якщо збігів кілька</strong> — обирає рядок з найдовшою маскою (найточніший збіг)</li>\n<li>➡️ <strong>Пересилає пакет</strong> на інтерфейс або next-hop з цього рядка</li>\n</ol>\n<h2>📏 Параметри метрики</h2>\n<p><strong>Метрика</strong> — числова оцінка «вартості» маршруту. Чим менша — тим кращий маршрут.</p>\n<table>\n<thead>\n<tr>\n<th>Параметр</th>\n<th>🏷️ Опис</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>📶 Смуга пропускання</td>\n<td>Пропускна здатність каналу (bps)</td>\n</tr>\n<tr>\n<td>⏱️ Затримка</td>\n<td>Час проходження пакета від відправника до отримувача</td>\n</tr>\n<tr>\n<td>📊 Навантаження</td>\n<td>Ступінь використання ресурсів каналу</td>\n</tr>\n<tr>\n<td>🛡️ Надійність</td>\n<td>Рівень помилок у мережевому каналі</td>\n</tr>\n<tr>\n<td>🔢 Кількість переходів</td>\n<td>Кількість маршрутизаторів (hops) на шляху</td>\n</tr>\n<tr>\n<td>💰 Вартість</td>\n<td>Довільне значення, визначене адміністратором</td>\n</tr>\n</tbody></table>\n<div class=\"note\"><strong>📝 Приклад: RIP vs OSPF</strong> <p>Уявіть два шляхи до мережі <code>10.0.0.0/8</code>:</p>\n<ul>\n<li><strong>Шлях A:</strong> 2 хопи через канал 1 Мбіт/с</li>\n<li><strong>Шлях B:</strong> 3 хопи через канал 1 Гбіт/с</li>\n</ul>\n<p><strong>RIP</strong> (метрика = кількість хопів) обере <strong>шлях A</strong> — він «коротший».<br><strong>OSPF</strong> (метрика враховує пропускну здатність) обере <strong>шлях B</strong> — він швидший.<br>Це наочно показує, чому вибір протоколу маршрутизації має значення.</p>\n</div>\n\n","<h1>⚡ Апаратна та програмна маршрутизація</h1>\n<p><strong>Головна ідея:</strong> Маршрутизація може виконуватись як спеціалізованим обладнанням, так і звичайним програмним забезпеченням на комп'ютері. Різниця — у швидкості та призначенні.</p>\n<h2>🔧 Апаратна маршрутизація</h2>\n<p>Спеціалізовані маршрутизатори (Cisco, Juniper) поділяють роботу між двома компонентами:</p>\n<table>\n<thead>\n<tr>\n<th>Компонент</th>\n<th>Роль</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🧠 CPU + ПЗ («прошивка»)</td>\n<td>Будує та оновлює таблиці маршрутизації через протоколи маршрутизації</td>\n</tr>\n<tr>\n<td>⚡ ASIC / комутаційна матриця</td>\n<td>Апаратно пересилає пакети з лінійною швидкістю — без участі CPU</td>\n</tr>\n</tbody></table>\n<div class=\"tip\"><strong>💡 Чому це важливо?</strong> <p>Саме завдяки ASIC апаратний маршрутизатор пересилає мільйони пакетів за секунду. Програмний маршрутизатор обмежений продуктивністю CPU.</p>\n</div>\n\n\n\n<h2>💻 Програмна маршрутизація</h2>\n<p>Будь-який комп'ютер з кількома мережевими інтерфейсами може виконувати маршрутизацію:</p>\n<ul>\n<li>🪟 <strong>Windows Server</strong> — служба <strong>RRAS</strong> (Routing and Remote Access Service)</li>\n<li>🐧 <strong>Linux / BSD</strong> — демони <code>routed</code>, <code>quagga</code>, або вбудовані засоби ядра</li>\n<li>🎓 <strong>Навчальні середовища</strong> — Cisco Packet Tracer, GNS3</li>\n</ul>\n<div class=\"note\"><strong>📝 Де ви вже стикались із програмною маршрутизацією?</strong> <p>Ваш домашній роутер — це і є програмний маршрутизатор: звичайний процесор запускає Linux і виконує маршрутизацію між вашою домашньою мережею та Інтернетом.</p>\n</div>\n\n","<h1>📡 Протоколи маршрутизації</h1>\n<div class=\"info\"><strong>ℹ️ Визначення</strong> <p><strong>Протокол маршрутизації</strong> — набір правил, за якими маршрутизатори автоматично обмінюються інформацією про мережу та будують таблиці маршрутизації.</p>\n</div>\n\n\n\n<p><strong>Головна ідея:</strong> Без протоколу маршрутизації кожен маршрутизатор «не знає», що відбувається за межами його безпосередніх сусідів. Протокол вирішує це, організовуючи постійний обмін інформацією про стан мережі.</p>\n<h2>📬 Що визначає протокол маршрутизації?</h2>\n<ul>\n<li>📤 <strong>Яким чином</strong> розсилаються оновлення — всім сусідам чи лише зацікавленим</li>\n<li>📦 <strong>Яка інформація</strong> передається — вся таблиця чи лише зміни</li>\n<li>⏰ <strong>Як часто</strong> надсилаються оновлення — за таймером чи лише при змінах</li>\n<li>🎯 <strong>Яка метрика</strong> використовується для вибору найкращого маршруту</li>\n</ul>\n","<h1>🧮 Алгоритми динамічної маршрутизації</h1>\n<p><strong>Головна ідея:</strong> Існує два принципово різних підходи до того, як маршрутизатори дізнаються про стан мережі.</p>\n<h2>📐 Дистанційно-векторний (Distance Vector)</h2>\n<p>Кожен маршрутизатор знає лише <strong>відстань до сусідів</strong> і передає їм свою таблицю цілком. Сусіди передають далі — і так поступово інформація розповсюджується по мережі.</p>\n<div class=\"note\"><strong>📝 Принцип роботи</strong> <p>Маршрутизатор не має повної картини мережі — він довіряє інформації від сусідів і будує маршрути на її основі. Що далі від джерела — то менш актуальні дані.</p>\n</div>\n\n\n\n<p>➡️ Протокол: <strong>RIP</strong> (метрика — кількість хопів, максимум 15)</p>\n<h2>🗺️ Стану каналів (Link State)</h2>\n<p>Кожен маршрутизатор збирає <strong>повну карту мережі</strong>, розповсюджуючи інформацію про стан своїх каналів усім вузлам. На основі цієї карти кожен самостійно обчислює найкоротший шлях за алгоритмом Дейкстри.</p>\n<div class=\"note\"><strong>📝 Принцип роботи</strong> <p>На відміну від дистанційно-векторного підходу, кожен маршрутизатор має однакове і повне уявлення про топологію мережі — і приймає рішення незалежно.</p>\n</div>\n\n\n\n<p>➡️ Протокол: <strong>OSPF</strong> (метрика враховує пропускну здатність каналів)</p>\n","<h1>⚖️ Комутатор vs. Маршрутизатор</h1>\n<p><strong>Головна ідея:</strong> Обидва пристрої передають дані в мережі, але на різних рівнях OSI і з різною областю відповідальності. Комутатор оперує MAC-адресами в межах однієї мережі; маршрутизатор — IP-адресами між різними мережами.</p>\n<div class=\"note\"><strong>📝 Важливе уточнення</strong> <p>Комутатор і маршрутизатор — це <strong>пристрої</strong>, назви яких походять від їхньої основної функції. Насправді маршрутизатор теж виконує комутацію пакетів, а комутатор — приймає рішення про маршрут фрейму до конкретного порту. Різниця — у рівні OSI та адресному просторі, а не в тому, що одне «комутує», а інше — «маршрутизує».</p>\n</div>\n\n\n\n<h2>📊 Порівняльна таблиця</h2>\n<table>\n<thead>\n<tr>\n<th>Функція</th>\n<th>🔀 Комутатор</th>\n<th>🗺️ Маршрутизатор</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>🏗️ Рівень OSI</td>\n<td>Рівень 2 (канальний)</td>\n<td>Рівень 3 (мережевий)</td>\n</tr>\n<tr>\n<td>🏷️ Адресація</td>\n<td>MAC-адреси</td>\n<td>IP-адреси</td>\n</tr>\n<tr>\n<td>⚡ Швидкість обробки</td>\n<td>Вища</td>\n<td>Нижча</td>\n</tr>\n<tr>\n<td>📢 Широкомовні розсилки</td>\n<td>Пропускаються</td>\n<td>Блокуються</td>\n</tr>\n<tr>\n<td>🛡️ Безпека</td>\n<td>Нижча</td>\n<td>Вища</td>\n</tr>\n<tr>\n<td>🌐 Сегментація</td>\n<td>Сегментує домени колізій; широкомовний домен — спільний для всіх портів</td>\n<td>Сегментує мережу на окремі широкомовні та колізійні домени</td>\n</tr>\n</tbody></table>\n\n<div class=\"mermaid\" data-source=\"graph LR\n    H1[🖥️ Хост A] --&gt;|Фрейм до MAC шлюзу| SW[🔀 Комутатор L2]\n    SW --&gt;|Пересилає фрейм на порт шлюзу| R[🗺️ Маршрутизатор]\n    R --&gt;|Маршрутизує за IP-адресою| NET2[🌐 Інша мережа]\n    style SW fill:#e3f2fd,stroke:#1565c0\n    style R fill:#e8f5e9,stroke:#388e3c\n    style H1 fill:#fff3e0,stroke:#ef6c00\n    style NET2 fill:#fce4ec,stroke:#c2185b\"><svg id=\"exp-1772987014365-12-0\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" class=\"flowchart\" style=\"max-width: 1281.859375px;\" viewBox=\"0 0 1281.859375 64\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#exp-1772987014365-12-0{font-family:system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#exp-1772987014365-12-0 .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50 \"1.1em\"><tspan font-style=\"normal\" class=\"text-inner-tspan\" font-weight=\"normal\">Маршрутизує</tspan><tspan font-style=\"normal\" class=\"text-inner-tspan\" font-weight=\"normal\"> за</tspan></tspan><tspan class=\"text-outer-tspan\" x=\"0\" y=\"1em\" dy=\"1.1em\"><tspan font-style=\"normal\" class=\"text-inner-tspan\" font-weight=\"normal\">IP-адресою</tspan></tspan></text></g></g></g></g><g class=\"nodes\"><g class=\"node default  \" id=\"flowchart-H1-0\" transform=\"translate(67.265625, 32)\"><rect class=\"basic label-container\" style=\"fill:#fff3e0 !important;stroke:#ef6c00 !important\" x=\"-59.265625\" y=\"-24\" width=\"118.53125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-35.265625, -12)\"><rect></rect><foreignObject width=\"70.53125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🖥️ Хост A</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-SW-1\" transform=\"translate(435.6953125, 32)\"><rect class=\"basic label-container\" style=\"fill:#e3f2fd !important;stroke:#1565c0 !important\" x=\"-86.03125\" y=\"-24\" width=\"172.0625\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-62.03125, -12)\"><rect></rect><foreignObject width=\"124.0625\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🔀 Комутатор L2</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-R-3\" transform=\"translate(832.359375, 32)\"><rect class=\"basic label-container\" style=\"fill:#e8f5e9 !important;stroke:#388e3c !important\" x=\"-95.4140625\" y=\"-24\" width=\"190.828125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-71.4140625, -12)\"><rect></rect><foreignObject width=\"142.828125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🗺️ Маршрутизатор</p></span></div></foreignObject></g></g><g class=\"node default  \" id=\"flowchart-NET2-5\" transform=\"translate(1190.46875, 32)\"><rect class=\"basic label-container\" style=\"fill:#fce4ec !important;stroke:#c2185b !important\" x=\"-83.390625\" y=\"-24\" width=\"166.78125\" height=\"48\"></rect><g class=\"label\" style=\"\" transform=\"translate(-59.390625, -12)\"><rect></rect><foreignObject width=\"118.78125\" height=\"24\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;\"><span class=\"nodeLabel \"><p>🌐 Інша мережа</p></span></div></foreignObject></g></g></g></g></g></svg></div>\n<div class=\"warning\"><strong>⚠️ Широкомовні шторми</strong> <p>Комутатори пропускають широкомовні пакети — це може призвести до <strong>широкомовного шторму</strong> (broadcast storm), який паралізує мережу. Маршрутизатори блокують широкомовний трафік, обмежуючи зону поширення проблеми.</p>\n</div>\n\n","<h1>✅ Ключові висновки</h1>\n<div class=\"success\"><strong>✅ Підсумок лекції</strong> <p><strong>📌 Що ми розглянули:</strong></p>\n<ol>\n<li><p><strong>Комутація</strong> — механізм спільного використання каналів зв'язку між абонентами; існує три види: каналів, пакетів та повідомлень</p>\n</li>\n<li><p><strong>Маршрутизація</strong> — процес визначення оптимального шляху для пакетів; виконується маршрутизаторами на 3-му рівні OSI</p>\n</li>\n<li><p><strong>Класифікація маршрутизації</strong>: без таблиць (лавинна, керована подіями, від джерела) та на основі таблиць (статична, динамічна)</p>\n</li>\n<li><p><strong>Таблиця маршрутизації</strong> — зберігає мережу призначення, маску, наступний хоп, інтерфейс і метрику для кожного відомого маршруту</p>\n</li>\n<li><p><strong>Метрика</strong> — числова оцінка «вартості» маршруту; розраховується за смугою пропускання, затримкою, кількістю переходів та іншими параметрами</p>\n</li>\n<li><p><strong>Два класи алгоритмів</strong>: дистанційно-векторні (RIP) та алгоритми стану каналів (OSPF)</p>\n</li>\n<li><p><strong>Ключова відмінність комутатора і маршрутизатора</strong>: комутатор — MAC + рівень 2, пропускає широкомовний трафік; маршрутизатор — IP + рівень 3, блокує широкомовні шторми і сегментує мережу на окремі broadcast-домени</p>\n</li>\n</ol>\n</div>\n\n","<h1>❓ Контрольні питання</h1>\n<ol>\n<li><p>🤔 Що таке комутація і навіщо вона потрібна в мережах?</p>\n</li>\n<li><p>🤔 Чим відрізняються комутація каналів, пакетів та повідомлень?</p>\n</li>\n<li><p>🤔 Що зберігається в таблиці маршрутизації і як маршрутизатор обирає маршрут?</p>\n</li>\n<li><p>🤔 Коли доцільно використовувати статичну маршрутизацію, а коли — динамічну?</p>\n</li>\n<li><p>🤔 Що таке метрика і які параметри на неї впливають?</p>\n</li>\n<li><p>🤔 Чим відрізняються дистанційно-векторні алгоритми від алгоритмів стану каналів?</p>\n</li>\n<li><p>🤔 У чому принципова різниця між комутатором і маршрутизатором?</p>\n</li>\n</ol>\n","<h1>📖 Глосарій термінів</h1>\n<table>\n<thead>\n<tr>\n<th>Термін</th>\n<th>English</th>\n<th>Визначення</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Комутація</td>\n<td>Switching</td>\n<td>Процес з'єднання абонентів через транзитні вузли з розподілом каналів</td>\n</tr>\n<tr>\n<td>Маршрутизація</td>\n<td>Routing</td>\n<td>Процес визначення оптимального шляху пакетів у мережі</td>\n</tr>\n<tr>\n<td>Маршрутизатор</td>\n<td>Router</td>\n<td>Пристрій, що виконує маршрутизацію пакетів між мережами на 3-му рівні OSI</td>\n</tr>\n<tr>\n<td>Таблиця маршрутизації</td>\n<td>Routing Table</td>\n<td>База даних маршрутизатора з інформацією про шляхи до мереж</td>\n</tr>\n<tr>\n<td>Наступний хоп</td>\n<td>Next Hop</td>\n<td>IP-адреса сусіднього маршрутизатора, якому передається пакет</td>\n</tr>\n<tr>\n<td>Метрика</td>\n<td>Metric</td>\n<td>Числова оцінка «вартості» або якості маршруту</td>\n</tr>\n<tr>\n<td>Широкомовний домен</td>\n<td>Broadcast Domain</td>\n<td>Сегмент мережі, в межах якого розповсюджуються широкомовні пакети</td>\n</tr>\n<tr>\n<td>Збіжність</td>\n<td>Convergence</td>\n<td>Процес досягнення узгодженого стану таблиць маршрутизації у всіх маршрутизаторів мережі</td>\n</tr>\n</tbody></table>\n","<h1>📖 Глосарій абревіатур</h1>\n<table>\n<thead>\n<tr>\n<th>Абревіатура</th>\n<th>Розшифровка</th>\n<th>Переклад</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><strong>OSI</strong></td>\n<td>Open Systems Interconnection</td>\n<td>Модель взаємодії відкритих систем</td>\n</tr>\n<tr>\n<td><strong>IP</strong></td>\n<td>Internet Protocol</td>\n<td>Інтернет-протокол</td>\n</tr>\n<tr>\n<td><strong>MAC</strong></td>\n<td>Media Access Control</td>\n<td>Управління доступом до середовища</td>\n</tr>\n<tr>\n<td><strong>RIP</strong></td>\n<td>Routing Information Protocol</td>\n<td>Протокол маршрутної інформації</td>\n</tr>\n<tr>\n<td><strong>OSPF</strong></td>\n<td>Open Shortest Path First</td>\n<td>Відкритий протокол пошуку найкоротшого шляху</td>\n</tr>\n<tr>\n<td><strong>RRAS</strong></td>\n<td>Routing and Remote Access Service</td>\n<td>Служба маршрутизації та віддаленого доступу</td>\n</tr>\n</tbody></table>\n"];let currentSlideIndex=0;
function renderMath(root){if(typeof renderMathInElement!=="function"||!root)return;try{renderMathInElement(root,{delimiters:[{left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},{left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false,strict:"ignore",ignoredTags:["script","noscript","style","textarea","pre","code"]});}catch(e){console.warn("Math render error:",e);}}
function showSlide(i){if(i<0||i>=slides.length)return;currentSlideIndex=i;const el=document.getElementById("current-slide");el.innerHTML=slides[i];el.scrollTop=0;renderMath(el);document.getElementById("progress-bar").style.width=((i+1)/slides.length*100)+"%";document.getElementById("slide-number").textContent=(i+1)+" / "+slides.length;updateSidebarActive();}
function nextSlide(){if(currentSlideIndex<slides.length-1)showSlide(currentSlideIndex+1);}
function previousSlide(){if(currentSlideIndex>0)showSlide(currentSlideIndex-1);}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");}
function toggleHelp(){document.getElementById("help-overlay").classList.toggle("hidden");}
function toggleFullscreen(){if(!document.fullscreenElement){const pc=document.getElementById("presentation-container");if(pc.requestFullscreen)pc.requestFullscreen();else if(pc.webkitRequestFullscreen)pc.webkitRequestFullscreen();else if(pc.msRequestFullscreen)pc.msRequestFullscreen();else if(pc.mozRequestFullScreen)pc.mozRequestFullScreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();else if(document.msExitFullscreen)document.msExitFullscreen();else if(document.mozCancelFullScreen)document.mozCancelFullScreen();}}
function generateSidebar(){const sc=document.getElementById("sidebar-content");sc.innerHTML="";slides.forEach((html,idx)=>{const t=document.createElement("div");t.className="slide-thumbnail";if(idx===0)t.classList.add("active");const tmp=document.createElement("div");tmp.innerHTML=html;const title=tmp.querySelector("h1,h2");const titleText=title?title.textContent:("Слайд "+(idx+1));const textContent=tmp.textContent.replace(/s+/g," ").trim();const preview=textContent.substring(0,100)+(textContent.length>100?"...":"");t.innerHTML="<div class=\"slide-thumbnail-number\">"+(idx+1)+"</div><div class=\"slide-thumbnail-title\">"+titleText+"</div><div class=\"slide-thumbnail-content\">"+preview+"</div>";t.onclick=()=>{showSlide(idx);if(window.innerWidth<1024)toggleSidebar();};sc.appendChild(t);});}
function updateSidebarActive(){document.querySelectorAll(".slide-thumbnail").forEach((th,idx)=>{if(idx===currentSlideIndex){th.classList.add("active");th.scrollIntoView({behavior:"smooth",block:"nearest"});}else th.classList.remove("active");});}
document.addEventListener("keydown",e=>{switch(e.key){case"ArrowLeft":previousSlide();break;case"ArrowRight":case" ":e.preventDefault();nextSlide();break;case"f":case"F":toggleFullscreen();break;case"s":case"S":toggleSidebar();break;case"?":toggleHelp();break;case"Escape":const sb=document.getElementById("sidebar");const ho=document.getElementById("help-overlay");if(sb.classList.contains("open"))toggleSidebar();else if(!ho.classList.contains("hidden"))ho.classList.add("hidden");break;}});
generateSidebar();showSlide(0);</script></body></html>
